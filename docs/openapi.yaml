components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PublicId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      in: query
      name: size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  requestBodies:
    ToolCheckRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ToolCheckRequest"
  responses:
    ToolCheckSuccess:
      description: Tool check кІ°кіј
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ToolCheckResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT_STATE, DUPLICATE_RESOURCE, FILE_VALIDATION_ERROR, PRECONDITION_REQUIRED, UPSTREAM_ERROR, INTERNAL_ERROR]
        message:
          type: string
        details:
          type: object
          description: >
            Tool-specific detail object. For performance Tool responses this may include
            cpuBenchmarkScore, gpuBenchmarkScore, and gameFpsEvidence items shaped
            like GameFpsEvidenceDto. gameFpsEvidenceStatus is included only when
            gameFpsEvidence has at least one row.
          additionalProperties: true
    GameFpsEvidenceDto:
      type: object
      required: [id, gameTitle, gameKey, resolution, graphicsPreset, avgFps, sourceName, sourceUrl, confidence, match]
      properties:
        id:
          type: string
          format: uuid
        gameTitle:
          type: string
        gameKey:
          type: string
        resolution:
          type: string
          enum: [FHD, QHD, 4K]
        graphicsPreset:
          type: string
        avgFps:
          type: number
          format: double
        onePercentLowFps:
          type: number
          format: double
          nullable: true
        sourceName:
          type: string
        sourceUrl:
          type: string
        sourceCheckedAt:
          type: string
          format: date
        confidence:
          $ref: "#/components/schemas/Confidence"
        match:
          type: object
          required: [gameMatched, resolutionMatched, gpuClassMatched, cpuClassMatched, exactGpuPartMatched, exactCpuPartMatched, evidenceExactness]
          properties:
            requestedGameKey:
              type: string
              nullable: true
            requestedResolution:
