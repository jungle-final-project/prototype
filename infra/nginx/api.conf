map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_cloudfront_forwarded_proto $proxy_x_forwarded_proto {
    default $scheme;
    http http;
    https https;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # API JSON 응답 압축으로 전송량·지연을 줄인다. CloudFront가 origin 요청에 Via 헤더를 붙이므로
    # gzip_proxied any가 없으면 nginx가 프록시 요청을 무압축 처리하는 함정이 있어 반드시 함께 켠다.
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_types application/json application/javascript text/css text/plain application/xml image/svg+xml;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /ws/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        return 404;
    }
}
