# 커스텀 메인 설정 — stock nginx:1.27-alpine 기본값에서 부하테스트 상한만 올린다.
# 근거: 기본 worker_connections 1024는 프록시 요청당 연결 2개(클라이언트+업스트림)를 쓰므로
# 워커당 동시 ~512 in-flight가 상한 → breakpoint/spike에서 앱보다 nginx가 먼저 무너진다.
user  nginx;
worker_processes  auto;
# 워커가 실제로 4096 연결을 열 수 있도록 FD 상한을 함께 올린다(compose ulimits와 짝).
worker_rlimit_nofile 16384;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # 부하테스트 해석용 타이밍 로그: $request_time-$upstream_response_time = nginx 대기,
    # $upstream_connect_time ~0/'-' = keepalive 재사용 증명. 버퍼링으로 로그 I/O 부하 완화.
    log_format  perf  '$remote_addr [$time_local] "$request" $status $body_bytes_sent '
                      '$request_time $upstream_connect_time $upstream_response_time';

    access_log  /var/log/nginx/access.log  perf buffer=64k flush=5s;

    sendfile        on;

    keepalive_timeout  65;

    include /etc/nginx/conf.d/*.conf;
}
