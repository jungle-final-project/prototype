map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_cloudfront_forwarded_proto $proxy_x_forwarded_proto {
    default $scheme;
    http http;
    https https;
}

# Tomcat으로 가는 커넥션 풀. keepalive가 없으면 요청마다 새 TCP를 열어 단일 (nginx→api:8080)
# 튜플의 TIME_WAIT 소진이 처리량을 ~수백 conn/s로 캡한다 — 앱 속도와 무관한 상한.
# keepalive_timeout 30s는 Tomcat keep-alive-timeout(75s)보다 짧게 — nginx가 먼저 닫아
# 비멱등 POST가 죽은 커넥션에 실리는 502를 방지한다.
upstream buildgraph_api {
    server api:8080;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 30s;
}

server {
    listen 80 backlog=4096;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    # HTML/JS/CSS/JSON 응답 압축. CloudFront Via 헤더로 인한 무압축 함정을 피하려면 gzip_proxied any 필수.
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_types application/json application/javascript text/css text/plain application/xml image/svg+xml;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # 컨테이너 내부 전용 커넥션 카운터(부하테스트 수집기용): docker exec <web> curl -s localhost/nginx_status
    location = /nginx_status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 동기 LLM 경로만 장시간 허용 — 빌드챗/AS챗(/api/ai/**), 요구사항 파싱, PC Agent 진단챗.
    # 일반 /api/에 300s를 주면 포화 시 느린 요청이 워커 커넥션을 인질로 잡는다.
    location ^~ /api/ai/ {
        proxy_pass http://buildgraph_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /api/requirements/parse {
        proxy_pass http://buildgraph_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location ^~ /api/agent/ {
        proxy_pass http://buildgraph_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /api/ {
        proxy_pass http://buildgraph_api;
        proxy_http_version 1.1;
        # keepalive 재사용 필수: 기본값이면 nginx가 Connection: close를 업스트림에 보낸다.
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        # 일반 API의 p99 목표는 sub-second — 30s면 충분히 관대하고, 포화 시 커넥션 인질을 막는다.
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /ws/ {
        proxy_pass http://buildgraph_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
